<!-- start custom footer snippets -->

<p class="footer-meta">
  <a href="/sitemap/">Sitemap</a>
{% assign visitor_page_id = site.visitor_badge.page_id | default: "haichuanliu.top" %}
{% assign visitor_left_text = site.visitor_badge.left_text | default: "visitors" %}
  <span class="footer-meta__separator" aria-hidden="true">·</span>
  <a class="footer-meta__visitor-badge"
     href="https://visitor-badge.laobi.icu/"
     target="_blank"
     rel="noopener noreferrer"
     aria-label="Visitor count">
    <img src="https://visitor-badge.laobi.icu/badge?page_id={{ visitor_page_id | uri_escape }}&left_text={{ visitor_left_text | uri_escape }}"
         alt="Visitors">
  </a>
</p>

<!-- Support for MatJax -->
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Plotly -->
<script defer src='https://cdnjs.cloudflare.com/ajax/libs/plotly.js/3.0.1/plotly.min.js'></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<!-- end custom footer snippets -->
