<!-- start custom footer snippets -->

<p class="footer-meta">
  <a href="/sitemap/">Sitemap</a>
{% assign goatcounter_code = site.goatcounter.code | default: "" %}
{% if goatcounter_code != "" %}
  <span id="goatcounter-footer" hidden>
    <span class="footer-meta__separator" aria-hidden="true">·</span>
    <span class="footer-meta__label">Total visits</span>
    <span id="goatcounter-total" class="footer-meta__value" aria-live="polite"></span>
  </span>
{% endif %}
</p>

<!-- Support for MatJax -->
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Plotly -->
<script defer src='https://cdnjs.cloudflare.com/ajax/libs/plotly.js/3.0.1/plotly.min.js'></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

{% if goatcounter_code != "" %}
<script>
  (function () {
    var footerCounter = document.getElementById("goatcounter-footer");
    var totalCounter = document.getElementById("goatcounter-total");
    var url = "https://{{ goatcounter_code }}.goatcounter.com/counter/TOTAL.json";

    if (!footerCounter || !totalCounter || !window.fetch) {
      return;
    }

    fetch(url, { credentials: "omit" })
      .then(function (response) {
        if (!response.ok) {
          throw new Error("GoatCounter total unavailable");
        }
        return response.json();
      })
      .then(function (data) {
        if (!data || !data.count) {
          return;
        }
        totalCounter.textContent = data.count;
        footerCounter.hidden = false;
      })
      .catch(function () {
        footerCounter.hidden = true;
      });
  }());
</script>
<script data-goatcounter="https://{{ goatcounter_code }}.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>
{% endif %}

<!-- end custom footer snippets -->
